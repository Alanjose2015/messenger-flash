<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger-flash</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%) !important;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            width: 100%;
            max-width: 410px;
            background: #ffffff !important;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title {
            font-size: 22px;
            font-weight: 800;
            color: #0f172a;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f5f9;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-text {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            color: #0f172a;
            background-color: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            font-weight: 600;
            transition: all 0.2s;
        }

        .input-text:focus {
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        #destino {
            border: 2px solid #ffedd5;
            background-color: #fff7ed;
            color: #c2410c;
        }
        #destino:focus {
            border-color: #ea580c;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(234, 88, 12, 0.15);
        }

        .btn-action-blue {
            width: 100%;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%) !important;
            color: #ffffff !important;
            font-size: 16px;
            font-weight: 700;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            text-align: center;
        }

        .coordination-alert {
            background-color: #fef3c7 !important;
            border-left: 5px solid #d97706 !important;
            padding: 12px;
            border-radius: 6px;
        }

        .coordination-alert h4 {
            font-size: 14px;
            font-weight: 700;
            color: #78350f;
            margin-bottom: 2px;
        }

        .coordination-alert p {
            font-size: 12px;
            color: #b91c1c;
            font-style: italic;
            font-weight: 700;
        }

        .cost-summary-card {
            background: #0b1329 !important;
            border: 2px solid #1e293b !important;
            color: #ffffff !important;
            padding: 24px;
            border-radius: 18px;
            text-align: center;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .cost-summary-card h3 {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
        }

        .display-price {
            font-size: 46px;
            font-weight: 900;
            color: #22c55e !important;
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.6);
            margin-bottom: 6px;
        }

        .legal-notice {
            font-size: 11px;
            color: #475569;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .btn-action-green {
            width: 100%;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%) !important;
            color: #ffffff !important;
            font-size: 15px;
            font-weight: 700;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(22, 163, 74, 0.4);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <h2 class="section-title">Detalles del Envío</h2>

        <div class="form-group">
            <label for="origen">Dirección de Origen (Retiro):</label>
            <input type="text" id="origen" class="input-text" placeholder="Ej: Jujuy 200">
        </div>

        <div class="form-group">
            <label for="destino">Dirección de Destino (Entrega):</label>
            <input type="text" id="destino" class="input-text" placeholder="Ej: Uruguay 1000">
        </div>

        <button id="btnCalcular" class="btn-action-blue">⚡ Calcular Costo Ahora</button>

        <div class="coordination-alert">
            <h4>💳 Coordinación de Operación</h4>
            <p>¡Solicitar información de pago en la base de operaciones al enviar el pedido!</p>
        </div>

        <div class="cost-summary-card">
            <h3>Costo Estimado</h3>
            <div id="txtPrecio" class="display-price">$0</div>
            <p class="legal-notice">
                *El precio final puede variar según las condiciones climáticas, horarios de alta demanda o la distancia real recorrida.
            </p>
            <button id="btnWhatsApp" class="btn-action-green">🏍️💨 Solicitar por WhatsApp</button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
