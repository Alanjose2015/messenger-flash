<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>⚡ MESSENGER-FLASH | Mensajería Tucumán</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0F172A', secondary: '#EAB308', accent: '#3B82F6' },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .text-shadow { text-shadow: 0 0 15px rgba(234, 179, 8, 0.7); }
            .box-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
            .box-glow-yellow { box-shadow: 0 0 20px rgba(234, 179, 8, 0.4); }
            .border-glow { border: 2px solid rgba(234, 179, 8, 0.5); }
            .input-movil { font-size: 16px !important; }
        }
    </style>
    <style>
        #mapa { height: 350px; width: 100%; border-radius: 16px; touch-action: manipulation; z-index: 1; }
        body { overscroll-behavior: none; }
    </style>
</head>
<body class="bg-gradient-to-br from-primary via-blue-900 to-primary min-h-screen font-sans pb-8">
    <div class="container mx-auto px-3 py-6 max-w-3xl">
        
        <header class="text-center mb-10 pt-6">
            <h1 class="text-[clamp(2.5rem,14vw,4.5rem)] font-black text-secondary text-shadow tracking-wider mb-3">⚡ MESSENGER-FLASH ⚡</h1>
            <p class="text-white/90 text-lg font-medium px-2">🚚 Mensajería Rápida en TUCUMÁN 🚚</p>
            <div class="w-48 h-1.5 bg-secondary mx-auto mt-4 rounded-full box-glow-yellow"></div>
        </header>

        <main class="bg-white/95 backdrop-blur-lg rounded-[2rem] p-6 md:p-8 box-glow border-glow relative overflow-hidden mx-2">
            <form id="formularioEnvio" class="space-y-6 relative z-10">

                <div class="bg-blue-50/80 p-5 rounded-2xl border border-blue-200">
                    <label class="block text-base font-bold text-primary mb-3">👤 TU NOMBRE COMPLETO</label>
                    <input type="text" id="nombreCliente" placeholder="Escribe aquí tu nombre..." class="w-full px-5 py-4 rounded-xl border border-gray-300 input-movil" required>
                </div>

                <div class="bg-red-50/80 p-5 rounded-2xl border border-red-200">
                    <label class="block text-base font-bold text-primary mb-3">📍 DIRECCIÓN DE RETIRO</label>
                    <input type="text" id="origen" placeholder="Ej: San Martin 123, San Miguel de Tucuman" class="w-full px-5 py-4 rounded-xl border border-gray-300 input-movil" required>
                </div>

                <div class="bg-green-50/80 p-5 rounded-2xl border border-green-200">
                    <label class="block text-base font-bold text-primary mb-3">📍 DIRECCIÓN DE ENTREGA</label>
                    <input type="text" id="destino" placeholder="Ej: Av. Aconquija 1000, Yerba Buena" class="w-full px-5 py-4 rounded-xl border border-gray-300 input-movil" required>
                </div>

                <div class="bg-yellow-50/80 p-5 rounded-2xl border border-yellow-200">
                    <label class="block text-base font-bold text-primary mb-3">📦 ¿QUÉ VAS A ENVIAR?</label>
                    <select id="tipoEnvio" class="w-full px-5 py-4 rounded-xl border border-gray-300 bg-white input-movil" required>
                        <option value="">-- Selecciona --</option>
                        <option value="comida">🍕 Comida</option>
                        <option value="bebidas">🥤 Bebidas</option>
                        <option value="fragil">📦 Cosas frágiles</option>
                        <option value="documento">📄 Documentos</option>
                        <option value="compras">🛒 Compras</option>
                        <option value="otros">❓ Otros</option>
                    </select>
                </div>

                <div id="mapa" class="mt-6 hidden shadow-lg"></div>

                <div id="resultados" class="mt-6 p-6 rounded-2xl bg-gradient-to-r from-blue-100 to-yellow-100 border-2 border-accent/30 hidden shadow-lg text-center">
                    <h3 class="font-bold text-primary text-xl mb-4">📋 RESUMEN</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="bg-white/90 p-3 rounded-lg"><p class="text-xs text-gray-500">Distancia</p><p class="font-bold text-accent text-xl"><span id="distanciaValor">0</span> km</p></div>
                        <div class="bg-white/90 p-3 rounded-lg"><p class="text-xs text-gray-500">Tiempo</p><p class="font-bold text-accent text-xl"><span id="tiempoValor">0</span> min</p></div>
                        <div class="bg-white/90 p-3 rounded-lg"><p class="text-xs text-gray-500 text-green-700">TARIFA</p><p class="font-bold text-green-700 text-2xl">$ <span id="tarifaValor">0</span></p></div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-accent text-white font-bold py-5 rounded-2xl text-lg uppercase box-glow hover:bg-blue-700 transition-all">🚀 Calcular Precio</button>

                <a id="botonWhatsapp" href="#" target="_blank" class="hidden w-full bg-green-500 text-white font-bold py-5 rounded-2xl text-lg text-center uppercase box-glow-yellow block">
                    <i class="fa fa-whatsapp mr-2"></i> Pedir Cadete
                </a>
            </form>
        </main>
        
        <footer class="mt-8 text-center text-white/70 text-sm">
            <p>Correo: poncejose027@gmail.com</p>
        </footer>
    </div>

    <script>
        const TARIFA_BASE = 1800, PRECIO_POR_KM = 400, NUMERO_WHATSAPP = "5493815727447";
        let mapa;

        document.getElementById('formularioEnvio').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Cargando...";
            btn.disabled = true;

            try {
                const nombre = document.getElementById('nombreCliente').value;
                const origen = document.getElementById('origen').value + ", Tucuman, Argentina";
                const destino = document.getElementById('destino').value + ", Tucuman, Argentina";
                const tipo = document.getElementById('tipoEnvio').value;

                const c1 = await buscarCoord(origen);
                const c2 = await buscarCoord(destino);

                if (!c1 || !c2) {
                    alert("⚠️ No encontramos las direcciones. Por favor, escribe: Calle, Altura y Localidad.");
                    btn.innerText = "🚀 Calcular Precio";
                    btn.disabled = false;
                    return;
                }

                const ruta = await obtenerRuta(c1, c2);
                const dist = (ruta.distance / 1000).toFixed(2);
                const tiempo = Math.round(ruta.duration / 60);
                const total = Math.round(TARIFA_BASE + (parseFloat(dist) * PRECIO_POR_KM));

                document.getElementById('distanciaValor').innerText = dist;
                document.getElementById('tiempoValor').innerText = tiempo;
                document.getElementById('tarifaValor').innerText = total;
                document.getElementById('resultados').classList.remove('hidden');
                document.getElementById('botonWhatsapp').classList.remove('hidden');

                const msj = encodeURIComponent(`Hola, soy ${nombre}. Pedido Messenger-Flash:\nRetiro: ${origen}\nEntrega: ${destino}\nTipo: ${tipo}\nDistancia: ${dist}km\nTotal: $${total}`);
                document.getElementById('botonWhatsapp').href = `https://wa.me/${NUMERO_WHATSAPP}?text=${msj}`;

                mostrarMapa(c1, c2, ruta.geometry);
            } catch (err) {
                alert("⚠️ Error temporal. Revisa tu conexión e intenta de nuevo.");
            } finally {
                btn.innerText = "🚀 Calcular Precio";
                btn.disabled = false;
            }
        });

        async function buscarCoord(dir) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(dir)}&limit=1`, {
                    headers: { 'User-Agent': 'MessengerFlashApp' }
                });
                const d = await res.json();
                return d.length ? [parseFloat(d[0].lat), parseFloat(d[0].lon)] : null;
            } catch { return null; }
        }

        async function obtenerRuta(c1, c2) {
            const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${c1[1]},${c1[0]};${c2[1]},${c2[0]}?overview=full&geometries=geojson`);
            const d = await res.json();
            return d.routes[0];
        }

        function mostrarMapa(c1, c2, geo) {
            document.getElementById('mapa').classList.remove('hidden');
            if (mapa) mapa.remove();
            mapa = L.map('mapa').setView(c1, 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            L.marker(c1).addTo(mapa);
            L.marker(c2).addTo(mapa);
            L.geoJSON(geo, { style: { color: '#3B82F6', weight: 5 } }).addTo(mapa);
            mapa.fitBounds(L.geoJSON(geo).getBounds());
        }
    </script>
</body>
    </html>
