<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger-flash - Cadetería Tucumán</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
        }

        .subtitle {
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #34495e;
            font-weight: 600;
            font-size: 14px;
        }

        .icon {
            margin-right: 8px;
            font-size: 16px;
        }

        input[type="text"],
        input[type="number"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-label {
            color: #7f8c8d;
            font-size: 14px;
        }

        .result-value {
            color: #2c3e50;
            font-weight: 600;
            font-size: 14px;
            word-break: break-word;
        }

        .total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label {
            color: #2c3e50;
            font-size: 18px;
            font-weight: 700;
        }

        .total-value {
            color: #667eea;
            font-size: 24px;
            font-weight: 700;
        }

        .whatsapp-btn {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            margin-top: 20px;
        }

        .whatsapp-btn:hover {
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
        }

        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            font-weight: 600;
            display: none;
        }

        .error.show {
            display: block;
        }

        .note {
            font-size: 11px;
            color: #e74c3c;
            margin-top: 5px;
            font-style: italic;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚚 Messenger-flash</h1>
        <p class="subtitle">Cadetería Tucumán - Cotización Rápida</p>
        
        <!-- Campos de texto para direcciones exactas -->
        <div class="form-group">
            <label><span class="icon">📍</span>Dirección de Retiro (Exacta)</label>
            <input type="text" id="direccionRetiro" placeholder="Ej: Av. Aconquija 1234, Yerba Buena" required>
        </div>

        <div class="form-group">
            <label><span class="icon">🎯</span>Dirección de Entrega (Exacta)</label>
            <input type="text" id="direccionEntrega" placeholder="Ej: Calle 24 de Septiembre 567, Centro" required>
        </div>

        <div class="form-group">
            <label><span class="icon">⚖️</span>Peso (kg)</label>
            <input type="number" id="peso" placeholder="Ej: 5" min="0.1" step="0.1" required>
        </div>

        <div class="form-group">
            <label><span class="icon">☀️</span>Condiciones</label>
            <select id="condicion">
                <option value="normal">☀️ Día Normal</option>
                <option value="lluvia">🌧️ Lluvia (+20%)</option>
                <option value="pico">🕐 Horario Pico (+15%)</option>
            </select>
        </div>

        <button onclick="calcular()">Calcular LoMasExactoPosible</button>
        
        <div class="error" id="error"></div>

        <div class="result" id="resultado">
            <h3>💰 Resumen de Solicitud</h3>
            <div class="result-item">
                <span class="result-label">Retiro:</span>
                <span class="result-value" id="res-retiro"></span>
            </div>
            <div class="result-item">
                <span class="result-label">Entrega:</span>
                <span class="result-value" id="res-entrega"></span>
            </div>
            <div class="result-item">
                <span class="result-label">Peso:</span>
                <span class="result-value" id="res-peso"></span>
            </div>
            <div class="total">
                <span class="total-label">Estimado:</span>
                <span class="total-value" id="res-total"></span>
            </div>
            <p class="note">*Precio estimado. Confirmá el envío por WhatsApp.</p>
            <button class="whatsapp-btn" onclick="enviarWhatsapp()">📱 Enviar Solicitud por WhatsApp</button>
        </div>
    </div>

    <script>
        const PRECIO_POR_KM = 400; 450;
        const TARIFA_BASE =1500;
        const NUMERO_WHATSAPP = "5493815727447";

        let ultimoDato = null;

        function mostrarError(mensaje) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = mensaje;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function calcular() {
            const dirRetiro = document.getElementById('direccionRetiro').value.trim();
            const dirEntrega = document.getElementById('direccionEntrega').value.trim();
            const peso = parseFloat(document.getElementById('peso').value);
            const condicion = document.getElementById('condicion').value;
            const resultadoDiv = document.getElementById('resultado');

            document.getElementById('error').classList.remove('show');
            resultadoDiv.classList.remove('show');

            if (!dirRetiro || !dirEntrega) {
                mostrarError('⚠️ Ingresá las direcciones exactas');
                return;
            }
            if (dirRetiro.toLowerCase() === dirEntrega.toLowerCase()) {
                mostrarError('⚠️ Las direcciones deben ser diferentes');
                return;
            }
            if (!peso || peso <= 0) {
                mostrarError('⚠️ Ingresá un peso válido');
                return;
            }

            // Estimación simple basada en peso y condiciones
            let estimado = TARIFA_BASE + (peso * 1200);
            
            if (condicion === 'lluvia') estimado *= 1900;
            if (condicion === 'pico') estimado *= 1.500;
            if (peso > 5) estimado *= 5; // Descuento por volumen

            const total = Math.round(estimado);

            ultimoDato = {
                retiro: dirRetiro,
                entrega: dirEntrega,
                peso: peso,
                condicion: condicion,
                total: total
            };

            document.getElementById('res-retiro').textContent = dirRetiro;
            document.getElementById('res-entrega').textContent = dirEntrega;
            document.getElementById('res-peso').textContent = `${peso} kg`;
            document.getElementById('res-total').textContent = `$${total}`;
            
            resultadoDiv.classList.add('show');
        }

        function enviarWhatsapp() {
            if (!ultimoDato) {
                mostrarError('⚠️ Primero calculá el estimado');
                return;
            }

            const d = ultimoDato;
            const condicionTexto = d.condicion === 'normal' ? 'Día Normal' : d.condicion === 'lluvia' ? 'Lluvia' : 'Horario Pico';

            // Mensaje que te llega a TU WhatsApp con las direcciones EXACTAS
            const mensaje = `
*🚚 Nueva Solicitud - Messenger-flash*
--------------------------
📍 *Retiro:* ${d.retiro}
🎯 *Entrega:* ${d.entrega}
⚖️ *Peso:* ${d.peso} kg
☀️ *Condición:* ${condicionTexto}
--------------------------
💰 *Precio estimado:* $${d.total}
            `.trim();

            const url = `https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }
    </script>
</body>
                </html>
