<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Flash</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 16px;
        }
        .app-container {
            width: 100%; max-width: 410px; background: #ffffff;
            border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 24px; display: flex; flex-direction: column; gap: 20px;
        }
        .header { text-align: center; }
        .section-title {
            font-size: 22px; font-weight: 800; color: #0f172a;
            padding-bottom: 10px; border-bottom: 2px solid #f1f5f9; margin-bottom: 10px;
        }
        
        /* Estilos para el nuevo mensaje promocional */
        .promo-banner {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            margin: 10px 0;
            animation: fadeIn 1s ease-in;
        }
        .promo-title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .promo-discount {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .promo-tag {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn-whatsapp-promo {
            background-color: #25D366;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4);
            transition: transform 0.2s, background-color 0.2s;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-whatsapp-promo:hover {
            transform: translateY(-2px);
            background-color: #128C7E;
        }
        .btn-whatsapp-promo:active {
            transform: translateY(0);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .info-text { 
            font-size: 12px; 
            color: #94a3b8; 
            text-align: center; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1 class="section-title">⚡ Messenger Flash</h1>
            <p style="color: #64748b; font-size: 14px;">Tucumán - Ofertas Exclusivas</p>
        </div>

        <!-- NUEVO BLOQUE PROMOCIONAL -->
        <div class="promo-banner">
            <div class="promo-title">¡PIDE TU COTIZACIÓN AHORA!</div>
            <div class="promo-discount">
                🚀 Descuentos del <strong>5%, 10%, 15%</strong> y hasta el <strong>20%</strong><br>en tus viajes.
            </div>
            <div class="promo-tag">✨ ¡Cuanto más usas la web, menos pagas! ✨</div>
            
            <button id="btnContactarPromo" class="btn-whatsapp-promo">
                📲 ¡Quiero mi descuento!
            </button>
        </div>
        
        <p class="info-text">*Los descuentos se aplican directamente en el chat de WhatsApp.</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const NUMERO_WHATSAPP = "5493815727447";
            
            const btnContactar = document.getElementById("btnContactarPromo");
            
            if (btnContactar) {
                btnContactar.addEventListener("click", function() {
                    const mensaje = encodeURIComponent(
                        `*🚀 ¡QUIERO MI COTIZACIÓN CON DESCUENTO!*\n\n` +
                        `Hola, vi la oferta de descuentos progresivos.\n` +
                        `Quiero pedir mi viaje y aprovechar el descuento del 5%, 10%, 15% o 20%.\n\n` +
                        `¡Espero su respuesta para coordinar!`
                    );
                    
                    // Enlace correcto a WhatsApp
                    const url = `https://wa.me/${NUMERO_WHATSAPP}?text=${mensaje}`;
                    window.open(url, "_blank");
                });
            }
        });
    </script>
</body>
    </html>
