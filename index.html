<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador de Envíos - Tucumán</title>
    <style>
        :root {
            --primary: #25D366;
            --primary-dark: #128C7E;
            --secondary: #007bff;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #333333;
            --text-light: #666666;
            --border: #ddd;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 25px; }
        header { text-align: center; margin-bottom: 25px; border-bottom: 2px solid var(--bg); padding-bottom: 15px; }
        h1 { color: var(--primary-dark); font-size: 1.8rem; margin-bottom: 5px; }
        p.subtitle { color: var(--text-light); font-size: 0.9rem; }

        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text); }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; transition: border 0.3s; }
        input:focus, select:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.2); }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.3s; margin-top: 10px; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: var(--primary-dark); }
        .btn-whatsapp { background-color: #25D366; color: white; display: none; margin-top: 15px; }
        .btn-whatsapp:hover { background-color: #128C7E; }
        .btn-reset { background-color: #6c757d; color: white; margin-top: 10px; }

        #resultado { margin-top: 25px; padding: 20px; background: #e8f5e9; border-radius: 8px; border-left: 5px solid var(--success); display: none; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .res-total { font-size: 1.3rem; font-weight: bold; color: var(--primary-dark); margin-top: 10px; border-top: 1px solid #ccc; padding-top: 10px; }

        .loading { text-align: center; color: var(--text-light); display: none; margin: 15px 0; }
        .error { color: var(--danger); font-size: 0.9rem; margin-top: 5px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚚 Cotizador Tucumán</h1>
        <p class="subtitle">Calculá el costo de tu envío al instante</p>
    </header>

    <form id="cotizadorForm">
        <div class="form-group">
            <label for="origen">📍 Dirección de Origen (Calle y Altura)</label>
            <input type="text" id="origen" placeholder="Ej: Av. Aconquija 1234, San Miguel de Tucumán" required>
            <div id="error-origen" class="error"></div>
        </div>

        <div class="form-group">
            <label for="destino">🏁 Dirección de Destino</label>
            <input type="text" id="destino" placeholder="Ej: Bv. Sarmiento 500, Tafí Viejo" required>
            <div id="error-destino" class="error"></div>
        </div>

        <div class="form-group">
            <label for="peso">⚖️ Peso del paquete (kg)</label>
            <input type="number" id="peso" step="0.1" min="0.1" placeholder="Ej: 2.5" required>
        </div>

        <div class="form-group">
            <label for="tipo">📦 Tipo de Envío</label>
            <select id="tipo">
                <option value="estandar">Estándar (24-48hs)</option>
                <option value="express">Express (24hs)</option>
                <option value="urgente">Urgente (Inmediato)</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Calcular Precio</button>
    </form>

    <div id="loading" class="loading">Calculando ruta y distancia...</div>

    <div id="resultado">
        <h3>📊 Detalle del Envío</h3>
        <div class="res-item"><span>Distancia:</span> <span id="res-distancia">0 km</span></div>
        <div class="res-item"><span>Tiempo estimado:</span> <span id="res-tiempo">0 min</span></div>
        <div class="res-item"><span>Base (Peso):</span> <span id="res-base">$0</span></div>
        <div class="res-item"><span>Recargo Tipo:</span> <span id="res-recargo">$0</span></div>
        <div class="res-total">Total: <span id="res-total">$0</span></div>
        
        <button id="btnWhatsapp" class="btn btn-whatsapp">📲 Enviar Cotización por WhatsApp</button>
        <button type="button" id="btnReset" class="btn btn-reset">Limpiar</button>
    </div>
</div>

<script>
    // Configuración de precios base (puedes editarlos aquí)
    const PRECIO_BASE_KM = 80; // $ por km
    const PRECIO_BASE_PESO = 500; // $ fijo por envío
    const PRECIO_POR_KG = 150; // $ por kg extra
    
    const RECARGOS = {
        'estandar': 1,
        'express': 1.5,
        'urgente': 2.0
    };

    const form = document.getElementById('cotizadorForm');
    const resultadoDiv = document.getElementById('resultado');
    const loadingDiv = document.getElementById('loading');
    const btnWhatsapp = document.getElementById('btnWhatsapp');
    const btnReset = document.getElementById('btnReset');

    // Función para geocodificar direcciones usando Nominatim (OpenStreetMap) - Gratuito
    async function geocodificarGeoref(direccion) {
        // Añadimos contexto de Tucumán para mejorar la precisión
        const query = `${direccion}, Tucumán, Argentina`;
        const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (data && data.length > 0) {
                return {
                    lat: data.lat,
                    lon: data.lon,
                    display_name: data.display_name
                };
            }
            throw new Error("Dirección no encontrada");
        } catch (error) {
            console.error("Error geocodificando:", error);
            return null;
        }
    }

    // Función para calcular distancia (Haversine)
    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371; // Radio de la tierra en km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = 
            Math.sin(dLat/2) * Math.sin(dLat/2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
            Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Limpiar estados
        document.getElementById('error-origen').style.display = 'none';
        document.getElementById('error-destino').style.display = 'none';
        resultadoDiv.style.display = 'none';
        btnWhatsapp.style.display = 'none';
        loadingDiv.style.display = 'block';

        const origenTxt = document.getElementById('origen').value;
        const destinoTxt = document.getElementById('destino').value;
        const peso = parseFloat(document.getElementById('peso').value);
        const tipo = document.getElementById('tipo').value;

        try {
            // Geocodificar
            const origenData = await geocodificarGeoref(origenTxt);
            if (!origenData) throw new Error("No se pudo encontrar la dirección de origen");

            const destinoData = await geocodificarGeoref(destinoTxt);
            if (!destinoData) throw new Error("No se pudo encontrar la dirección de destino");

            // Calcular distancia
            const distanciaKm = calcularDistancia(
                origenData.lat, origenData.lon,
                destinoData.lat, destinoData.lon
            );

            // Calcular precio
            let costoBase = PRECIO_BASE_PESO + (peso * PRECIO_POR_KG);
            let costoDistancia = distanciaKm * PRECIO_BASE_KM;
            let subtotal = costoBase + costoDistancia;
            
            let multiplicador = RECARGOS[tipo];
            let total = subtotal * multiplicador;

            // Mostrar resultados
            document.getElementById('res-distancia').textContent = distanciaKm.toFixed(2) + ' km';
            document.getElementById('res-tiempo').textContent = Math.round(distanciaKm * 1.5) + ' min (aprox)';
            document.getElementById('res-base').textContent = '$' + subtotal.toFixed(2);
            document.getElementById('res-recargo').textContent = 'x' + multiplicador + ' (' + tipo.toUpperCase() + ')';
            document.getElementById('res-total').textContent = '$' + total.toFixed(2);

            resultadoDiv.style.display = 'block';
            btnWhatsapp.style.display = 'block';
            
            // Configurar mensaje de WhatsApp
            const mensaje = `Hola! Quiero cotizar un envío:%0A%0A📍 Origen: ${origenTxt}%0A🏁 Destino: ${destinoTxt}%0A⚖️ Peso: ${peso} kg%0A📦 Tipo: ${tipo.toUpperCase()}%0A%0A💰 *Cotización estimada: $${total.toFixed(2)}*%0A(Distancia: ${distanciaKm.toFixed(2)} km)`;
            btnWhatsapp.onclick = () => {
                window.open(`https://wa.me/?text=${mensaje}`, '_blank');
            };

        } catch (error) {
            const errorMsg = error.message.includes('origen') ? 'error-origen' : 'error-destino';
            document.getElementById(errorMsg).textContent = error.message;
            document.getElementById(errorMsg).style.display = 'block';
        } finally {
            loadingDiv.style.display = 'none';
        }
    });

    btnReset.addEventListener('click', () => {
        form.reset();
        resultadoDiv.style.display = 'none';
        document.getElementById('error-origen').style.display = 'none';
        document.getElementById('error-destino').style.display = 'none';
    });
</script>

</body>
                </html>
