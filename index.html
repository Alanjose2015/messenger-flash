<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger Flash - Ofertas</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 16px;
        }
        .app-container {
            width: 100%; max-width: 410px; background: #ffffff;
            border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 30px; text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header h1 {
            font-size: 24px; font-weight: 800; color: #0f172a; margin-bottom: 5px;
        }
        .header p { color: #64748b; font-size: 14px; margin-bottom: 30px; }
        
        /* TARJETA PROMOCIONAL (Lo único que se verá) */
        .promo-card {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border-radius: 20px;
            padding: 35px 20px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            position: relative;
            overflow: hidden;
        }
        .promo-title {
            font-size: 28px; font-weight: 900; margin-bottom: 15px;
            text-transform: uppercase; letter-spacing: 1px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .promo-text {
            font-size: 18px; line-height: 1.5; margin-bottom: 25px;
            font-weight: 500;
        }
        .highlight { color: #d1fae5; font-weight: 800; font-size: 20px; }
        .slogan {
            background: rgba(255, 255, 255, 0.2);
            display: inline-block; padding: 8px 20px; border-radius: 50px;
            font-size: 14px; font-weight: 700; margin-top: 10px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-whatsapp {
            background-color: #25D366; color: white; border: none;
            width: 100%; padding: 16px; font-size: 18px; font-weight: 800;
            border-radius: 50px; cursor: pointer; margin-top: 30px;
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.4);
            transition: all 0.3s ease; display: flex; align-items: center;
            justify-content: center; gap: 10px; text-transform: uppercase;
        }
        .btn-whatsapp:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(37, 211, 102, 0.6); }
        .footer-note { margin-top: 25px; font-size: 12px; color: #94a3b8; font-style: italic; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>⚡ Messenger Flash</h1>
            <p>Tucumán - Ofertas Exclusivas</p>
        </div>

        <!-- AQUÍ ESTÁ EL MENSAJE LLAMATIVO -->
        <div class="promo-card">
            <div class="promo-title">¡PIDE TU COTIZACIÓN AHORA!</div>
            <div class="promo-text">
                Descuentos del <span class="highlight">5%, 10%, 15%</span> y hasta el <span class="highlight">20%</span> en tus viajes.
            </div>
            <div class="slogan">✨ ¡Cuanto más usas la web, menos pagas! ✨</div>
            
            <button class="btn-whatsapp" onclick="enviarWhatsApp()">
                <span>📲</span> ¡Quiero mi descuento!
            </button>
        </div>
        
        <p class="footer-note">*Los descuentos se aplican directamente en el chat.</p>
    </div>

    <script>
        function enviarWhatsApp() {
            const numero = "5493815727447";
            const mensaje = "Hola! Quiero pedir una cotización y aprovechar los descuentos del 5%, 10%, 15% o 20%. ¡Necesito un viaje!";
            const url = `https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;
            window.open(url, '_blank');
        }
    </script>

</body>
    </html>
