<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger-flash</title>
    <style>
        body { background: #0f172a; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .app { background: #fff; width: 90%; max-width: 400px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #333; margin-bottom: 20px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        #precio-box { background: #f0f9ff; border: 2px solid #0ea5e9; padding: 15px; text-align: center; border-radius: 10px; margin: 20px 0; }
        #precio { font-size: 32px; font-weight: bold; color: #0284c7; }
        .btn { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #1d4ed8; }
        .status { font-size: 12px; color: #666; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="app">
    <h1>⚡ Messenger Flash</h1>
    
    <label>📍 Origen:</label>
    <input type="text" id="origen" placeholder="Ej: Yerba Buena">
    
    <label>🏁 Destino:</label>
    <input type="text" id="destino" placeholder="Ej: Centro">
    
    <div id="precio-box">
        <div id="precio">$0</div>
        <div id="status" class="status">Esperando datos...</div>
    </div>
    
    <button class="btn" onclick="enviarPedido()">📱 Enviar a WhatsApp</button>
</div>

<script>
    const ORIGEN = document.getElementById('origen');
    const DESTINO = document.getElementById('destino');
    const PRECIO = document.getElementById('precio');
    const STATUS = document.getElementById('status');
    const NUMERO = "5493815727447";
    
    // Configuración de precios
    const BASE = 1000;
    const KM = 800;
    const EXTRA_ZONA = 500;

    function calcular() {
        let o = ORIGEN.value.trim().toLowerCase();
        let d = DESTINO.value.trim().toLowerCase();
        
        if (!o || !d) {
            PRECIO.innerText = "$0";
            STATUS.innerText = "Ingresa origen y destino";
            return;
        }

        // 1. Calcular distancia (simulada)
        let km = 3.5; // Base
        if (o.includes("aconquija") && d.includes("centro")) km = 8.2;
        else if (o.includes("banda") || d.includes("banda")) km = 6.5;
        
        let costo = BASE + (km * KM);

        // 2. Factores Dinámicos Automáticos
        let msg = "";
        let mult = 1;

        // Horario Nocturno (22:00 - 06:00)
        let hora = new Date().getHours();
        if (hora >= 22 || hora < 6) {
            mult *= 1.3;
            msg += "🌙 Noche ";
        }

        // Zona Roja (Ejemplo: San Javier, Banda)
        if (o.includes("san javier") || d.includes("san javier") || o.includes("banda") || d.includes("banda")) {
            costo += EXTRA_ZONA;
            msg += "⚠️ Zona Riesgo ";
        }

        // Demanda Aleatoria (Simulación)
        if (Math.random() > 0.7) {
            mult *= 1.5;
            msg += "🌧️ Alta Demanda";
        }

        let final = Math.round(costo * mult);
        PRECIO.innerText = "$" + final;
        STATUS.innerText = msg || "✅ Tarifa Normal";
    }

    function enviarPedido() {
        let o = ORIGEN.value;
        let d = DESTINO.value;
        let p = PRECIO.innerText;
        let s = STATUS.innerText;
        
        if(!o || !d) { alert("Faltan datos"); return; }
        
        let msg = `*PEDIDO MESSENGER-FLASH*\n📍 Origen: ${o}\n🏁 Destino: ${d}\n💰 Costo: ${p}\n📊 Estado: ${s}\n\nConfirmar pedido?`;
        window.open(`https://wa.me/${NUMERO}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    ORIGEN.addEventListener('input', calcular);
    DESTINO.addEventListener('input', calcular);
</script>

</body>
</html>
